<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 160" fill="none">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@700&amp;family=Inter:wght@400;500&amp;display=swap');
    </style>
  </defs>

  <!-- Tilted square -->
  <rect x="28" y="28" width="90" height="90" rx="4"
        transform="rotate(-12 73 73)"
        stroke="#c41e3a" stroke-width="4" fill="none"/>

  <!-- G&P text inside square -->
  <text x="73" y="84"
        font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="36"
        fill="#c41e3a" text-anchor="middle"
        transform="rotate(-12 73 73)">G&amp;P</text>

  <!-- Partner im -->
  <text x="160" y="62"
        font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="28"
        fill="#c41e3a" letter-spacing="0.08em">Partner im</text>

  <!-- Beraternetzwerk -->
  <text x="160" y="102"
        font-family="'Space Grotesk', sans-serif" font-weight="700" font-size="28"
        fill="#c41e3a" letter-spacing="0.08em">Beraternetzwerk</text>
</svg>
